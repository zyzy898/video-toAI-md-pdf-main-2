<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="Mock UI: 账号登录界面">
  <defs>
    <linearGradient id="bg1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d14"/>
      <stop offset="1" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="acc1" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset=".55" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".5" cy="0" r=".7">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".22"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg1)"/>
  <rect width="480" height="270" fill="url(#glow1)"/>
  <!-- titlebar dots -->
  <g transform="translate(14 14)">
    <circle r="5" cx="6" cy="6" fill="#ff5f57"/>
    <circle r="5" cx="22" cy="6" fill="#febc2e"/>
    <circle r="5" cx="38" cy="6" fill="#28c840"/>
  </g>
  <!-- brand -->
  <g transform="translate(60 12)" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9" letter-spacing="1.2">
    <text x="0" y="14">VIDEO INSIGHTS · LOGIN</text>
  </g>
  <!-- centered card -->
  <g transform="translate(120 56)">
    <rect width="240" height="178" rx="14" fill="#12151f" stroke="#1f2937"/>
    <!-- brand badge -->
    <rect x="100" y="14" width="40" height="40" rx="10" fill="url(#acc1)"/>
    <polygon points="115,28 115,46 130,37" fill="#031016"/>
    <!-- title -->
    <text x="120" y="78" text-anchor="middle" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700">欢迎回到 Video Insights</text>
    <text x="120" y="92" text-anchor="middle" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="8">使用注册邮箱与密码继续</text>
    <!-- input 1 -->
    <rect x="20" y="106" width="200" height="22" rx="6" fill="#070910" stroke="#334155"/>
    <text x="28" y="121" fill="#64748b" font-family="system-ui,Segoe UI,sans-serif" font-size="9">name@company.com</text>
    <!-- input 2 -->
    <rect x="20" y="134" width="200" height="22" rx="6" fill="#070910" stroke="#22d3ee" stroke-opacity=".55"/>
    <text x="28" y="149" fill="#e2e8f0" font-family="system-ui,Segoe UI,sans-serif" font-size="9">••••••••••••</text>
    <!-- button -->
    <rect x="20" y="160" width="200" height="22" rx="6" fill="url(#acc1)"/>
    <text x="120" y="175" text-anchor="middle" fill="#031016" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="700">登 录</text>
  </g>
  <!-- focus ring overlay (active step indicator) -->
  <rect x="138" y="186" width="204" height="26" rx="8" fill="none" stroke="#22d3ee" stroke-opacity=".7" stroke-dasharray="3 3"/>
</svg>
