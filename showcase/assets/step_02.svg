<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="Mock UI: 新建项目并导入素材">
  <defs>
    <linearGradient id="bg2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d14"/>
      <stop offset="1" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="acc2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="glow2" cx=".5" cy="0" r=".8">
      <stop offset="0" stop-color="#60a5fa" stop-opacity=".18"/>
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg2)"/>
  <rect width="480" height="270" fill="url(#glow2)"/>
  <!-- top bar -->
  <rect x="0" y="0" width="480" height="32" fill="#0a0c12"/>
  <g transform="translate(14 12)">
    <circle r="4" cx="4" cy="4" fill="#ff5f57"/>
    <circle r="4" cx="18" cy="4" fill="#febc2e"/>
    <circle r="4" cx="32" cy="4" fill="#28c840"/>
  </g>
  <text x="60" y="20" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9" letter-spacing="1">PROJECTS / NEW</text>
  <!-- left sidebar -->
  <rect x="0" y="32" width="92" height="238" fill="#0a0c12"/>
  <g font-family="system-ui,Segoe UI,sans-serif" font-size="9" fill="#94a3b8">
    <rect x="10" y="48" width="72" height="20" rx="5" fill="#1f2937"/>
    <text x="20" y="62" fill="#e2e8f0">📁 我的项目</text>
    <text x="20" y="84">⚙ 分析参数</text>
    <text x="20" y="104">📜 历史记录</text>
    <text x="20" y="124">⬇ 导出</text>
  </g>
  <!-- main panel -->
  <g transform="translate(106 46)">
    <text x="0" y="10" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700">新建项目</text>
    <text x="0" y="24" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9">为这次分析命名，并拖入素材</text>
    <!-- input -->
    <rect x="0" y="34" width="356" height="22" rx="6" fill="#070910" stroke="#22d3ee" stroke-opacity=".55"/>
    <text x="8" y="49" fill="#e2e8f0" font-family="system-ui,Segoe UI,sans-serif" font-size="10">demo-001 · 产品操作演示</text>
    <!-- dropzone -->
    <rect x="0" y="66" width="356" height="92" rx="10" fill="#0c1018" stroke="#22d3ee" stroke-opacity=".4" stroke-dasharray="4 4"/>
    <g transform="translate(154 90)">
      <rect width="48" height="34" rx="8" fill="rgba(34,211,238,.08)" stroke="rgba(34,211,238,.35)"/>
      <path d="M14 22 v-6 M10 18 h8 M14 16 l4 -4 4 4 M28 22 h6" stroke="#67e8f9" stroke-width="1.6" fill="none" stroke-linecap="round"/>
    </g>
    <text x="178" y="142" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,Segoe UI,sans-serif" font-size="10" font-weight="600">拖拽视频到这里 · 或点击选择</text>
    <!-- thumbnails -->
    <g>
      <rect x="0" y="170" width="84" height="50" rx="6" fill="#1f2937"/>
      <rect x="6" y="176" width="72" height="38" rx="4" fill="url(#acc2)" opacity=".75"/>
      <polygon points="34,188 34,202 46,195" fill="#031016"/>
      <rect x="92" y="170" width="84" height="50" rx="6" fill="#1f2937"/>
      <rect x="98" y="176" width="72" height="38" rx="4" fill="#0f766e" opacity=".7"/>
      <polygon points="126,188 126,202 138,195" fill="#031016"/>
      <rect x="184" y="170" width="84" height="50" rx="6" fill="#1f2937" stroke="#22d3ee" stroke-opacity=".55"/>
      <rect x="190" y="176" width="72" height="38" rx="4" fill="#312e81" opacity=".7"/>
      <polygon points="218,188 218,202 230,195" fill="#031016"/>
    </g>
    <text x="0" y="232" fill="#64748b" font-family="system-ui,Segoe UI,sans-serif" font-size="8">3 个素材 · 已加入项目</text>
  </g>
</svg>
