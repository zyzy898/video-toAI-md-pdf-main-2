<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" role="img" aria-label="Mock UI: 启动分析查看实时进度">
  <defs>
    <linearGradient id="bg4" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b0d14"/>
      <stop offset="1" stop-color="#10131c"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="pulse4" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#bg4)"/>
  <!-- top bar -->
  <rect x="0" y="0" width="480" height="32" fill="#0a0c12"/>
  <g transform="translate(14 12)">
    <circle r="4" cx="4" cy="4" fill="#ff5f57"/>
    <circle r="4" cx="18" cy="4" fill="#febc2e"/>
    <circle r="4" cx="32" cy="4" fill="#28c840"/>
  </g>
  <text x="60" y="20" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9" letter-spacing="1">ANALYSIS / RUNNING</text>

  <!-- progress dialog -->
  <g transform="translate(60 56)">
    <rect width="360" height="170" rx="14" fill="#12151f" stroke="#22d3ee" stroke-opacity=".4"/>
    <!-- pulse glow behind percent -->
    <circle cx="324" cy="32" r="32" fill="url(#pulse4)"/>
    <text x="20" y="30" fill="#f8fafc" font-family="system-ui,Segoe UI,sans-serif" font-size="13" font-weight="700">分析进度</text>
    <g transform="translate(290 16)">
      <rect width="50" height="22" rx="999" fill="rgba(59,130,246,.18)" stroke="rgba(59,130,246,.45)"/>
      <text x="25" y="16" text-anchor="middle" fill="#bae6fd" font-family="system-ui,Segoe UI,sans-serif" font-size="11" font-weight="600">72%</text>
    </g>
    <text x="20" y="48" fill="#94a3b8" font-family="system-ui,Segoe UI,sans-serif" font-size="9">正在执行视觉增强 · 提升低置信度步骤的标题与描述...</text>

    <!-- progress track -->
    <rect x="20" y="62" width="320" height="8" rx="4" fill="#1f2937"/>
    <rect x="20" y="62" width="230" height="8" rx="4" fill="url(#bar4)"/>
    <!-- moving glow blob -->
    <circle cx="248" cy="66" r="9" fill="#22d3ee" opacity=".4"/>

    <!-- KV row -->
    <g transform="translate(20 86)" font-family="system-ui,Segoe UI,sans-serif">
      <rect width="76" height="44" rx="8" fill="#0c1220" stroke="#1f2937"/>
      <text x="8" y="14" fill="#64748b" font-size="7" letter-spacing=".06em">阶段</text>
      <text x="8" y="32" fill="#f8fafc" font-size="10" font-weight="600">vision_enhance</text>

      <g transform="translate(82 0)">
        <rect width="76" height="44" rx="8" fill="#0c1220" stroke="#1f2937"/>
        <text x="8" y="14" fill="#64748b" font-size="7" letter-spacing=".06em">已完成</text>
        <text x="8" y="32" fill="#6ee7b7" font-size="10" font-weight="700">2 / 3</text>
      </g>
      <g transform="translate(164 0)">
        <rect width="76" height="44" rx="8" fill="#0c1220" stroke="#1f2937"/>
        <text x="8" y="14" fill="#64748b" font-size="7" letter-spacing=".06em">失败</text>
        <text x="8" y="32" fill="#fda4af" font-size="10" font-weight="700">0</text>
      </g>
      <g transform="translate(246 0)">
        <rect width="74" height="44" rx="8" fill="#0c1220" stroke="rgba(34,211,238,.4)"/>
        <text x="8" y="14" fill="#64748b" font-size="7" letter-spacing=".06em">当前文件</text>
        <text x="8" y="32" fill="#a5f3fc" font-size="9" font-weight="600">tutorial_se…</text>
      </g>
    </g>

    <!-- bottom action -->
    <text x="20" y="150" fill="#64748b" font-family="system-ui,Segoe UI,sans-serif" font-size="8">点击右下角"开始分析"已完成 · 进度面板实时刷新</text>
    <g transform="translate(266 134)">
      <rect width="74" height="22" rx="8" fill="rgba(244,63,94,.1)" stroke="rgba(244,63,94,.4)"/>
      <text x="37" y="15" text-anchor="middle" fill="#fecdd3" font-family="system-ui,Segoe UI,sans-serif" font-size="9">取消任务</text>
    </g>
  </g>
</svg>
