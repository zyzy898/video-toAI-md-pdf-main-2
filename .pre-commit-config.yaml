repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: local
    hooks:
      - id: check-mojibake
        name: Check Chinese Mojibake
        entry: python scripts/check_mojibake.py
        language: system
        files: ^(app\.py|video_analyzer_agent\.py|web-react/.*\.(ts|tsx|js|jsx|css)|scripts/.*\.py)$

      - id: check-python-compile
        name: Check Python Syntax (py_compile)
        entry: python scripts/check_py_compile.py
        language: system
        files: \.py$
