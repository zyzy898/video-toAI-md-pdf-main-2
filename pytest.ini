[pytest]
testpaths = tests
python_files = test_*.py
addopts = -ra --strict-markers --strict-config
norecursedirs = .git .pytest_cache __pycache__ node_modules web-react/node_modules web-react/dist outputs uploads
filterwarnings =
    ignore:pkg_resources is deprecated as an API:DeprecationWarning:zhconv\.zhconv
    ignore:pkg_resources is deprecated as an API:UserWarning:zhconv\.zhconv
